name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild ColorfulLedKeyboardSet\ColorfulLedKeyboardSet.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU"

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\colorful-keyboard | Out-Null
          Copy-Item ColorfulLedKeyboardSet\bin\Release\colorful-keyboard.exe dist\colorful-keyboard\
          Copy-Item ColorfulLedKeyboardSet\bin\Release\colorful-keyboard.exe.config dist\colorful-keyboard\
          Copy-Item README.md dist\colorful-keyboard\
          Copy-Item LICENSE dist\colorful-keyboard\
          Compress-Archive -Path dist\colorful-keyboard\* -DestinationPath dist\colorful-keyboard.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: colorful-keyboard
          path: dist/colorful-keyboard.zip

      - name: Upload release asset
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF_NAME
            $title = $tag
            $notes = "colorful-keyboard $tag"
          } else {
            $tag = "latest"
            $title = "Latest build"
            $notes = "Latest successful build from $env:GITHUB_SHA"
            git tag -f $tag $env:GITHUB_SHA
            git push origin "refs/tags/$tag" --force
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --notes $notes --target $env:GITHUB_SHA
          } else {
            gh release edit $tag --title $title --notes $notes
          }
          gh release upload $tag dist\colorful-keyboard.zip --clobber
